<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Servidor Apache Docker - Balanceado</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .badge { font-size: 24px; font-weight: bold; padding: 15px; border: 2px dashed #ccc; margin-bottom: 20px; border-radius: 8px; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .gallery img { width: 100%; border-radius: 8px; }
        .video-container { margin-top: 30px; padding: 20px; background: #000; border-radius: 10px; }
        video { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="badge" id="server-label">Detectando servidor...</div>

    <h1>Servidor Apache con Docker</h1>
    <p>Este servidor utiliza un <b>volumen compartido</b>. Nginx distribuye el tráfico entre dos nodos Apache.</p>

    <h2>Galería de imágenes</h2>
    <div class="gallery">
        <img src="https://picsum.photos/300?random=1">
        <img src="https://picsum.photos/300?random=2">
        <img src="https://picsum.photos/300?random=3">
        <img src="https://picsum.photos/300?random=4">
        <img src="https://picsum.photos/300?random=5">
        <img src="https://picsum.photos/300?random=6">
    </div>

    <div class="video-container">
        <h2 style="color: white;">Vídeo del Servidor</h2>
        <video controls>
            <source src="videoplayback.mp4" type="video/mp4">
            Tu navegador no soporta la reproducción de vídeos.
        </video>
    </div>
</div>

<script>
    // Script para detectar el nodo mediante la cabecera X-Served-By
    fetch(window.location.href, { method: 'HEAD' })
    .then(response => {
        const serverInfo = response.headers.get('X-Served-By');
        const label = document.getElementById('server-label');
        
        if (serverInfo && serverInfo.includes('apache1')) {
            label.innerText = 'ESTÁS EN EL NODO: APACHE 1';
            label.style.color = 'red';
            label.style.borderColor = 'red';
        } else if (serverInfo && serverInfo.includes('apache2')) {
            label.innerText = 'ESTÁS EN EL NODO: APACHE 2';
            label.style.color = 'blue';
            label.style.borderColor = 'blue';
        } else {
            label.innerText = 'CONECTADO A: ' + serverInfo;
        }
    })
    .catch(err => {
        document.getElementById('server-label').innerText = 'Error al detectar nodo';
    });
</script>

</body>
</html>
