<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi servidor Apache Docker</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 40px;
  background: #f5f5f5;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

h1 {
  color: #333;
}

.badge {
  font-size: 28px;
  font-weight: bold;
  color: #666; 
  text-align: center;
  margin-bottom: 10px;
  padding: 10px;
  border: 2px dashed #ccc;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.gallery img {
  width: 100%;
  border-radius: 8px;
}

.video {
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="container">

<div id="servidor-badge" class="badge">IDENTIFICANDO SERVIDOR...</div>

<h1>Servidor Apache con Docker</h1>

<p>
Este servidor está corriendo dentro de un contenedor Docker con Apache. 
<strong>Ambos contenedores comparten este mismo archivo HTML.</strong>
</p>

<h2>Galería de imágenes</h2>
<div class="gallery">
<img src="https://picsum.photos/300?random=1">
<img src="https://picsum.photos/300?random=2">
<img src="https://picsum.photos/300?random=3">
<img src="https://picsum.photos/300?random=4">
<img src="https://picsum.photos/300?random=5">
<img src="https://picsum.photos/300?random=6">
</div>

<div class="video">
<h2>Vídeo random</h2>

<video width="100%" height="400" controls autoplay muted loop>
    <source src="videoplayback.mp4" type="video/mp4">
    Tu navegador no soporta video HTML5.
</video>

</div>

</div>

<script>
fetch(window.location.href)
    .then(response => {
        const serverAddr = response.headers.get('X-Servidor');
        const badge = document.getElementById('servidor-badge');
        
        if (serverAddr && serverAddr.includes('.3')) {
            badge.innerText = "SOY APACHE 1";
            badge.style.color = "red";
            badge.style.border = "none";
        } else if (serverAddr && serverAddr.includes('.2')) {
            badge.innerText = "SOY APACHE 2";
            badge.style.color = "blue";
            badge.style.border = "none";
        } else {
            badge.innerText = "SERVIDOR: " + serverAddr;
            badge.style.color = "green";
        }
    });
</script>

</body>
</html>
