services:
  apache1:
    image: httpd:latest
    container_name: apache1
    volumes:
      - ./web:/usr/local/apache2/htdocs/ # Carpeta compartida
    expose:
      - "80"
    restart: unless-stopped

  apache2:
    image: httpd:latest
    container_name: apache2
    volumes:
      - ./web:/usr/local/apache2/htdocs/ # Carpeta compartida
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - apache1
      - apache2
    restart: unless-stopped

volumes:
  nginx_cache: